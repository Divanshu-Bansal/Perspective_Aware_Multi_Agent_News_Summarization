name: Deploy Streamlit App

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    branches:
      - master          # Auto trigger on push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 1 hour max

    steps:
      # ── Step 1: Checkout code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python ─────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── Step 3: Cache pip dependencies ───────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Step 4: Install dependencies ─────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 5: Configure ClearML ─────────────────────────────────────────
      - name: Configure ClearML
        run: |
          python -c "
          from clearml import Task
          Task.set_credentials(
              api_host='https://api.clear.ml',
              web_host='https://app.clear.ml',
              files_host='https://files.clear.ml',
              key='${{ secrets.CLEARML_API_ACCESS_KEY }}',
              secret='${{ secrets.CLEARML_API_SECRET_KEY }}'
          )
          print('ClearML configured!')
          "

      # ── Step 6: Create .env file ──────────────────────────────────────────
      - name: Create .env file
        run: |
          cat > .env << ENVEOF
          NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
          GUARDIAN_API_KEY=${{ secrets.GUARDIAN_API_KEY }}
          GNEWS_API_KEY=${{ secrets.GNEWS_API_KEY }}
          CLEARML_API_ACCESS_KEY=${{ secrets.CLEARML_API_ACCESS_KEY }}
          CLEARML_API_SECRET_KEY=${{ secrets.CLEARML_API_SECRET_KEY }}
          CLEARML_API_HOST=https://api.clear.ml
          ENVEOF

      # ── Step 7: Create output directories ────────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p data/raw outputs/summaries

      # ── Step 8: Install Cloudflare tunnel ────────────────────────────────
      - name: Install Cloudflare tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      # ── Step 9: Start Streamlit + Cloudflare tunnel ───────────────────────
      - name: Launch app and print public URL
        run: |
          # Start Streamlit in background
          streamlit run app.py \
            --server.port 8501 \
            --server.address 0.0.0.0 \
            --server.headless true \
            --browser.gatherUsageStats false &

          # Wait for Streamlit to be ready
          echo "Waiting for Streamlit to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit is ready!"
              break
            fi
            sleep 2
          done

          # Start Cloudflare tunnel and capture URL
          echo "Starting Cloudflare tunnel..."
          cloudflared tunnel --url http://localhost:8501 \
            --no-autoupdate 2>&1 | tee /tmp/tunnel.log &

          # Wait for tunnel URL to appear
          echo "Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in {1..30}; do
            TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
            sleep 3
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "ERROR: Could not get tunnel URL"
            cat /tmp/tunnel.log
            exit 1
          fi

          # Print the URL clearly in logs
          echo ""
          echo "=============================================="
          echo "   APP IS LIVE — CLICK THE URL BELOW"
          echo "=============================================="
          echo ""
          echo "   $TUNNEL_URL"
          echo ""
          echo "=============================================="
          echo "   App will stay live for up to 6 hours"
          echo "   Keep this workflow running to maintain it"
          echo "=============================================="

          # Keep alive — check every 5 minutes
          while true; do
            sleep 300
            if ! curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit stopped unexpectedly"
              exit 1
            fi
            echo "App still running... $(date)"
          done
