name: Deploy Streamlit App

on:
  # Allows the workflow to be triggered manually from the GitHub Actions UI.
  workflow_dispatch:

  # Automatically runs the workflow whenever code is pushed to the master branch.
  push:
    branches:
      - master

jobs:
  deploy:
    # Uses the latest Ubuntu runner provided by GitHub Actions.
    runs-on: ubuntu-latest

    # Prevents the deployment job from running indefinitely.
    timeout-minutes: 60  # 1 hour max

    steps:
      # Checks out the repository code so the workflow can access project files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installs the required Python version for the Streamlit application.
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Caches pip packages to speed up future workflow runs.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Installs all Python dependencies listed in requirements.txt.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Configures ClearML using credentials stored securely in GitHub Secrets.
      - name: Configure ClearML
        run: |
          python -c "
          from clearml import Task
          Task.set_credentials(
              api_host='https://api.clear.ml',
              web_host='https://app.clear.ml',
              files_host='https://files.clear.ml',
              key='${{ secrets.CLEARML_API_ACCESS_KEY }}',
              secret='${{ secrets.CLEARML_API_SECRET_KEY }}'
          )
          print('ClearML configured!')
          "

      # Creates a .env file required by the application at runtime.
      # API keys and credentials are injected from GitHub Secrets.
      - name: Create .env file
        run: |
          cat > .env << ENVEOF
          NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
          GUARDIAN_API_KEY=${{ secrets.GUARDIAN_API_KEY }}
          GNEWS_API_KEY=${{ secrets.GNEWS_API_KEY }}
          CLEARML_API_ACCESS_KEY=${{ secrets.CLEARML_API_ACCESS_KEY }}
          CLEARML_API_SECRET_KEY=${{ secrets.CLEARML_API_SECRET_KEY }}
          CLEARML_API_HOST=https://api.clear.ml
          ENVEOF

      # Ensures required output folders exist before the application starts.
      - name: Create output directories
        run: |
          mkdir -p data/raw outputs/summaries

      # Installs Cloudflare Tunnel, which exposes the local Streamlit app publicly.
      - name: Install Cloudflare tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      # Starts the Streamlit application and exposes it through a temporary Cloudflare URL.
      - name: Launch app and print public URL
        run: |
          # Start Streamlit in background
          streamlit run app.py \
            --server.port 8501 \
            --server.address 0.0.0.0 \
            --server.headless true \
            --browser.gatherUsageStats false &

          # Wait for Streamlit to be ready
          echo "Waiting for Streamlit to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit is ready!"
              break
            fi
            sleep 2
          done

          # Start Cloudflare tunnel and capture URL
          echo "Starting Cloudflare tunnel..."
          cloudflared tunnel --url http://localhost:8501 \
            --no-autoupdate 2>&1 | tee /tmp/tunnel.log &

          # Wait for tunnel URL to appear
          echo "Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in {1..30}; do
            TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
            sleep 3
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "ERROR: Could not get tunnel URL"
            cat /tmp/tunnel.log
            exit 1
          fi

          # Print the URL clearly in logs
          echo ""
          echo "=============================================="
          echo "   APP IS LIVE — CLICK THE URL BELOW"
          echo "=============================================="
          echo ""
          echo "   $TUNNEL_URL"
          echo ""
          echo "=============================================="
          echo "   App will stay live for up to 1 hour"
          echo "   Keep this workflow running to maintain it"
          echo "=============================================="

          # Keep alive — check every 5 minutes
          while true; do
            sleep 300
            if ! curl -s http://localhost:8501 > /dev/null 2>&1; then
              echo "Streamlit stopped unexpectedly"
              exit 1
            fi
            echo "App still running... $(date)"
          done
